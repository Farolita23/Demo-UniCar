<!-- Banner principal de la página de inicio -->
<section class="home-banner">
    <div class="content">
        <div class="panel">
            <!-- Encabezado con gradiente tipográfico -->
            <h2>Comparte el viaje,<br><span>divide el camino</span></h2>
            <p>Encuentra compañeros de ruta para tu próximo trayecto</p>

            <!-- Formulario de búsqueda de viaje -->
            <div class="travel">
                <div class="origin">
                    <label>Origen</label>
                    <input type="text" placeholder="Ej.: Utrera">
                </div>
                <div class="destiny">
                    <label>Destino</label>
                    <input type="text" placeholder="Ej.: Los Palacios">
                </div>
                <input class="search" type="button" value="Buscar">
            </div>

            <!-- Estadísticas de confianza -->
            <div class="stats">
                <div class="stat">
                    <strong>2.4k+</strong>
                    <span>Viajeros</span>
                </div>
                <div class="stat">
                    <strong>8.1k+</strong>
                    <span>Viajes</span>
                </div>
                <div class="stat">
                    <strong>4.8★</strong>
                    <span>Valoración</span>
                </div>
            </div>
        </div>
    </div>
</section>
