<app-header></app-header>
<div class="page-wrapper auth-page">
  <div class="container auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="/assets/media/icon-dark.png" alt="UniCar" class="auth-logo">
        <h1>Bienvenido de nuevo</h1>
        <p>Accede a tu cuenta de UniCar</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <div class="form-group">
          <label class="label">Usuario</label>
          <input type="text" formControlName="username" placeholder="Tu nombre de usuario">
          @if (form.get('username')?.touched && form.get('username')?.invalid) {
            <span class="error-msg">Mínimo 3 caracteres requeridos</span>
          }
        </div>

        <div class="form-group">
          <label class="label">Contraseña</label>
          <div class="input-wrap">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Tu contraseña">
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        @if (error) {
          <div class="alert alert-error">{{ error }}</div>
        }

        <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> } @else { Acceder }
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/recovery-password">¿Olvidaste tu contraseña?</a>
        <span>·</span>
        <a routerLink="/signup">Crear cuenta</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
