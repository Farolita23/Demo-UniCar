<section class="paginator">
    <button class="first" [class.active]="cur !== 1" (click)="changeCur(1)"><<</button>
    <button class="back" [class.active]="cur !== 1" (click)="changeCur(cur - 1)"><</button>

    <div class="pages">
        @for (i of pages; track i; let index = $index) {
            <button [class.active]="i !== cur" (click)="changeCur(i)">{{ i }}</button>
        }
    </div>

    <button class="next" [class.active]="cur !== max" (click)="changeCur(cur + 1)">></button>
    <button class="last" [class.active]="cur !== max" (click)="changeCur(max)">>></button>
</section>
